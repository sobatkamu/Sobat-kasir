<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kasir - Liquid Glass</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="kasir-body">

<div class="app-container">
    <header class="header-liquid glass">
        <h1>Sobat <span>Kasir</span></h1>
        <div id="live-clock">00:00:00</div>
    </header>

    <div class="main-layout">
        <section class="menu-section">
            <h2 class="label">🍴 Menu Utama</h2>
            <div class="menu-grid">
                <div class="card-glass" onclick="addToOrder('Nasi BaBol', 18000)">
                    <span class="name">Nasi BaBol</span>
                    <span class="price">Rp 18.000</span>
                    <button class="btn-plus">+</button>
                </div>
                <div class="card-glass" onclick="addToOrder('Roti Bakar', 10000)">
                    <span class="name">Roti Bakar</span>
                    <span class="price">Rp 10.000</span>
                    <button class="btn-plus">+</button>
                </div>
                <div class="card-glass" onclick="addToOrder('Coklat Blend', 12000)">
                    <span class="name">Coklat Blend</span>
                    <span class="price">Rp 12.000</span>
                    <button class="btn-plus">+</button>
                </div>
            </div>
        </section>

        <aside class="billing-section glass">
            <h3>🛒 Pesanan Aktif</h3>
            <div id="cart-list" class="cart-items">
                <p class="empty">Belum ada item</p>
            </div>

            <div class="calc-area">
                <div class="row"><span>Total</span><span id="total-val">Rp 0</span></div>
                <div class="row"><span>Tunai</span><input type="number" id="cash-in" oninput="calc()"></div>
                <div class="row yellow-text"><span>Kembali</span><span id="change-val">Rp 0</span></div>
                <button class="btn-pay" onclick="checkout()">Selesaikan</button>
            </div>
        </aside>
    </div>

    <section class="history-section glass">
        <div class="hist-header">
            <h3>📜 Riwayat Terakhir</h3>
            <button onclick="exportExcel()" class="btn-small">Unduh Excel</button>
        </div>
        <div class="table-wrap">
            <table>
                <tbody id="hist-body"></tbody>
            </table>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
