<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kasir - POS System</title>
    <link rel="stylesheet" href="style-kasir.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="kasir-body">

<div class="container">
    <header class="header-kasir">
        <h1>Sobat Kasir</h1>
        <p>Pilih menu pesanan pembeli</p>
    </header>

    <div class="main-layout">
        <section class="menu-panel">
            <h2 class="category-title">🍴 Makanan</h2>
            <div class="menu-grid">
                <button class="card-item" onclick="addToOrder('Nasi BaBol', 18000)">
                    <span class="name">Nasi BaBol</span>
                    <span class="price">Rp 18.000</span>
                </button>
                <button class="card-item" onclick="addToOrder('Roti Bakar', 10000)">
                    <span class="name">Roti Bakar</span>
                    <span class="price">Rp 10.000</span>
                </button>
                <button class="card-item" onclick="addToOrder('Burger Komplit', 35000)">
                    <span class="name">Burger Komplit</span>
                    <span class="price">Rp 35.000</span>
                </button>
            </div>

            <h2 class="category-title">🥤 Minuman</h2>
            <div class="menu-grid">
                <button class="card-item drink" onclick="addToOrder('Coklat Milk', 12000)">
                    <span class="name">Coklat Milk</span>
                    <span class="price">Rp 12.000</span>
                </button>
                <button class="card-item drink" onclick="addToOrder('Vanilla Blend', 10000)">
                    <span class="name">Vanilla Blend</span>
                    <span class="price">Rp 10.000</span>
                </button>
            </div>
        </section>

        <aside class="billing-panel glass">
            <h3>Ringkasan Pembayaran</h3>
            <div id="order-list" class="order-list">
                <p class="empty-text">Belum ada pesanan.</p>
            </div>

            <div class="calculation-box">
                <div class="row">
                    <span>Total</span>
                    <span id="grand-total">Rp 0</span>
                </div>
                <div class="row">
                    <span>Bayar</span>
                    <input type="number" id="cash-input" placeholder="0" oninput="calculateChange()">
                </div>
                <div class="row highlight">
                    <span>Kembali</span>
                    <span id="change-display">Rp 0</span>
                </div>
                <button class="btn-finalize" onclick="finalizeTransaction()">Selesaikan Transaksi</button>
            </div>
        </aside>
    </div>

    <section class="report-section glass">
        <div class="report-header">
            <h3>📊 Laporan & Grafik</h3>
            <div class="report-btns">
                <button onclick="exportToExcel()">Ekspor Excel</button>
                <button class="btn-reset" onclick="resetData()">Reset Riwayat</button>
            </div>
        </div>
        <div class="report-grid">
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<audio id="bgMusic" loop src="Musik.mp3"></audio>
<script src="script-kasir.js"></script>
</body>
</html>
