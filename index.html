<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Sobat Kasir</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="rekap-body">

<div class="app-container">
    <header class="header-main glass">
        <h1>Rekap Mingguan</h1>
        <p id="range-minggu">Memuat periode...</p>
    </header>

    <section class="stats-grid">
        <div class="stat-card glass">
            <small>Total Omset Minggu Ini</small>
            <h2 id="omset-minggu">Rp 0</h2>
        </div>
        <div class="stat-card glass">
            <small>Menu Terlaris</small>
            <h2 id="top-menu">-</h2>
        </div>
    </section>

    <h2 class="section-label">📊 Performa Per Menu</h2>
    <div id="menu-performance-list" class="performance-container">
        </div>

    <section class="chart-section glass">
        <h3>Grafik Penjualan 7 Hari Terakhir</h3>
        <canvas id="weeklyChart"></canvas>
    </section>

    <div class="action-bar">
        <button class="btn-yellow" onclick="exportLaporan()">Unduh Laporan (Excel)</button>
        <button class="btn-outline" onclick="window.location.href='kasir.html'">Kembali ke Kasir</button>
    </div>
</div>

<script src="rekap.js"></script>
</body>
</html>
