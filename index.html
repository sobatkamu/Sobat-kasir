<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kamu - POS System Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>Sobat Kasir</h1>
    <div class="tabs">
        <button onclick="showTab('order')" id="btn-tab-order" class="tab-btn active">Menu & Pesan</button>
        <button onclick="showTab('history')" id="btn-tab-history" class="tab-btn">Status & Riwayat</button>
    </div>
</header>

<div id="order-tab" class="tab-content active">
    <div class="container">
        <h2 class="category-title">Makanan</h2>
        <div class="menu-grid" id="food-menu"></div>
        
        <h2 class="category-title">Minuman</h2>
        <div class="menu-grid" id="drink-menu"></div>
    </div>
</div>

<div id="history-tab" class="tab-content">
    <div class="container">
        <div class="income-card">
            <h3>Total Pemasukan (Selesai)</h3>
            <h2 id="total-income">Rp 0</h2>
        </div>
        
        <h2 class="category-title">Kelola Pesanan Aktif</h2>
        <div id="history-list"></div>
        <button class="btn-clear" onclick="clearAllData()">Reset Data Hari Ini</button>
    </div>
</div>

<div class="checkout-bar" id="checkout-bar">
    <div>
        <div class="total-label">Item: <span id="cart-count">0</span></div>
        <div class="total-price" id="current-total">Rp 0</div>
    </div>
    <button class="btn-checkout" onclick="processOrder()">Simpan Pesanan</button>
</div>

<script src="script.js"></script>
</body>
</html>
