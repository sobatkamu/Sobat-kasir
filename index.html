<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kasir - Modern POS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="kasir-body">

    <div id="floating-cashier" class="floating-bar glass">
        <div class="drag-handle">⠿ Total Pesanan (Geser Pinggir Untuk Ubah Lebar)</div>
        <div class="floating-content">
            <div class="total-main">
                <span id="display-total">Rp 0</span>
            </div>
            <div class="action-inputs">
                <input type="number" id="cash-input" placeholder="Tunai..." oninput="runCalculator()">
                <div class="change-box">Kembali: <span id="display-change">Rp 0</span></div>
                <button class="btn-pay" onclick="processTransaction()">Selesaikan</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <section id="cashier-section" class="active-section">
            <header class="section-header">
                <h2>🍴 Menu Utama</h2>
                <button class="nav-btn" onclick="switchTab('dashboard')">Lihat Riwayat & Grafik ⮕</button>
            </header>

            <div class="menu-grid">
                <div class="category-title">Makanan & Snack</div>
                <div class="menu-card">
                    <span class="name">Nasi Chiken BaBol</span>
                    <span class="price">Rp 18.000</span>
                    <button class="btn-yellow" onclick="addToOrder('Nasi BaBol', 18000)">+</button>
                </div>
                <div class="menu-card">
                    <span class="name">Roti Bakar</span>
                    <span class="price">Rp 10.000</span>
                    <button class="btn-yellow" onclick="addToOrder('Roti Bakar', 10000)">+</button>
                </div>
                
                <div class="category-title">Minuman Blend</div>
                <div class="menu-card">
                    <span class="name">Coklat Blend Milk</span>
                    <span class="price">Rp 12.000</span>
                    <button class="btn-yellow" onclick="addToOrder('Coklat Blend Milk', 12000)">+</button>
                </div>
            </div>

            <div class="mini-order-list glass">
                <h4>Item Dipilih:</h4>
                <div id="order-items"></div>
            </div>
        </section>

        <section id="dashboard-section" class="hidden-section">
            <header class="section-header">
                <button class="nav-btn" onclick="switchTab('cashier')">⬅ Kembali ke Kasir</button>
                <h2>📊 Laporan Penjualan</h2>
            </header>

            <div class="dashboard-grid">
                <div class="chart-container glass">
                    <canvas id="salesChart"></canvas>
                </div>
                <div class="history-container glass">
                    <div class="h-head">
                        <h3>Riwayat Transaksi</h3>
                        <button onclick="exportToExcel()" class="btn-util">Excel</button>
                    </div>
                    <table id="history-table">
                        <thead>
                            <tr><th>Jam</th><th>Total</th></tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <audio id="bgMusic" loop src="Musik.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
