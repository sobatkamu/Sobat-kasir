<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kamu POS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h2>Sobat Kamu - Kasir</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('order')">Order</button>
            <button class="tab-btn" onclick="showTab('history')">Riwayat</button>
        </div>
    </header>

    <div id="order-tab" class="tab-content active">
        <h3>🍴 Makanan</h3>
        <div class="menu-grid" id="food-menu"></div>
        <h3 style="margin-top:20px">🥤 Minuman</h3>
        <div class="menu-grid" id="drink-menu"></div>
    </div>

    <div id="history-tab" class="tab-content">
        <div style="background:var(--royal-blue); color:white; padding:15px; border-radius:10px; text-align:center">
            <p>Total Pemasukan (Selesai)</p>
            <h2 id="total-income">Rp 0</h2>
        </div>
        <div id="history-list" style="margin-top:20px"></div>
    </div>

    <div class="checkout-bar" id="checkout-bar">
        <div>Total: <strong id="current-total">Rp 0</strong> (<span id="cart-count">0</span> item)</div>
        <button class="btn-checkout" onclick="processOrder()">Simpan</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
