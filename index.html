<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kasir - Admin POS</title>
    <link rel="stylesheet" href="style-kasir.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="kasir-body">

<div class="app-wrapper">
    <section class="menu-panel glass">
        <header class="panel-header">
            <h1>Sobat Kasir</h1>
            <p>Pilih menu pesanan pembeli</p>
        </header>

        <div class="category-section">
            <h2 class="category-title">🍴 Makanan</h2>
            <div class="menu-grid-kasir">
                <button class="menu-btn" onclick="addToOrder('Nasi BaBol', 18000)">
                    <span class="name">Nasi BaBol</span>
                    <span class="price">18.000</span>
                </button>
                <button class="menu-btn" onclick="addToOrder('Roti Bakar', 10000)">
                    <span class="name">Roti Bakar</span>
                    <span class="price">10.000</span>
                </button>
                <button class="menu-btn" onclick="addToOrder('Burger Komplit', 35000)">
                    <span class="name">Burger Komplit</span>
                    <span class="price">35.000</span>
                </button>
            </div>

            <h2 class="category-title">🥤 Minuman</h2>
            <div class="menu-grid-kasir">
                <button class="menu-btn drink" onclick="addToOrder('Coklat Milk', 12000)">
                    <span class="name">Coklat Milk</span>
                    <span class="price">12.000</span>
                </button>
                <button class="menu-btn drink" onclick="addToOrder('Vanilla Blend', 10000)">
                    <span class="name">Vanilla Blend</span>
                    <span class="price">10.000</span>
                </button>
            </div>
        </div>
    </section>

    <aside class="billing-panel glass">
        <h3>Ringkasan Pembayaran</h3>
        <div id="order-list" class="order-list">
            <p class="empty-text">Belum ada pesanan.</p>
        </div>

        <div class="payment-card">
            <div class="calc-row">
                <span>Total</span>
                <span id="grand-total">Rp 0</span>
            </div>
            <div class="calc-row">
                <span>Bayar</span>
                <input type="number" id="cash-input" placeholder="0" oninput="calculateChange()">
            </div>
            <div class="calc-row highlight">
                <span>Kembali</span>
                <span id="change-display">Rp 0</span>
            </div>
            <button class="btn-finalize" onclick="finalizeTransaction()">Selesaikan Transaksi</button>
        </div>
    </aside>
</div>

<script src="script-kasir.js"></script>
</body>
</html>
